<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonatype Demo Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #162447;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 350px;
            text-align: center;
        }
        h2 {
            margin-bottom: 25px;
            color: #00d2fc;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #bfa3ff;
        }
        input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #1f4068;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            outline: 2px solid #00d2fc;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #e43f5a;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #ff4a6e;
        }
        .error-message {
            color: #ff4a4a;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Sonatype Portal</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" required placeholder="Enter your ID">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter your Password">
        </div>
        <button type="submit">Login</button>
    </form>
    <div id="errorMessage" class="error-message">아이디 또는 비밀번호가 틀렸어!</div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // 테스트용 무료 계정 정보 (원하는 대로 변경 가능)
        if (username === 'sonatype' && password === 'password123') {
            // 로그인 성공 시 welcome.html로 이동
            window.location.href = 'welcome.html';
        } else {
            // 로그인 실패 시 에러 메시지 표시
            document.getElementById('errorMessage').style.display = 'block';
        }
    });
</script>

</body>
</html>
