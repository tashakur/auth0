<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVID JOURNEY - Premium Travel Curation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #020617;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 배경 애니메이션 블롭 */
        .bg-glow-1 {
            position: absolute;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(255, 117, 140, 0.3) 0%, rgba(0,0,0,0) 70%);
            top: -15%;
            left: -10%;
            animation: float 14s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            position: absolute;
            width: 650px;
            height: 650px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.25) 0%, rgba(0,0,0,0) 70%);
            bottom: -20%;
            right: -10%;
            animation: float 20s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        /* 메인 컨테이너 */
        .main-card {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            width: 980px;
            height: 650px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        @media (max-width: 900px) {
            .main-card {
                grid-template-columns: 1fr;
                width: 420px;
                height: auto;
            }
            .left-panel { display: none; }
        }

        /* 오른쪽 패널 (양식 영역) */
        .left-panel {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.7), rgba(2, 6, 23, 0.85));
            padding: 55px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1540555700478-4be289fbecef?auto=format&fit=crop&w=1000&q=80') center/cover;
            opacity: 0.25;
            mix-blend-mode: luminosity;
            transition: opacity 0.5s;
        }

        .left-panel:hover::before {
            opacity: 0.35;
        }

        .brand-logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #00f2fe, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 1;
        }

        .intro-text h1 {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: 18px;
            letter-spacing: -1px;
            color: #f8fafc;
            z-index: 1;
            position: relative;
        }

        .intro-text p {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.7;
            z-index: 1;
            position: relative;
            font-weight: 300;
        }

        .tag-group {
            display: flex;
            gap: 10px;
            z-index: 1;
        }

        .tag {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            font-size: 12px;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        /* 오른쪽 패널 (양식 영역) */
        .right-panel {
            padding: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(2, 6, 23, 0.2);
            position: relative;
        }

        /* 로그인 / 회원가입 섹션 제어용 클래스 */
        .form-section {
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            margin-bottom: 35px;
        }

        .form-header h2 {
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
        }

        .input-container {
            position: relative;
            margin-bottom: 24px;
        }

        .input-container input {
            width: 100%;
            padding: 16px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-container input:focus {
            outline: none;
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.01);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
        }
