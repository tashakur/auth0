<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to DK Travel</title>
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    <style>
        /* 글로벌 스타일 및 메인 페이지와 동일한 폰트 세팅 */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #020617; /* 메인과 동일한 깊은 밤바다 색상 */
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 메인 페이지와 통일감을 주는 휴양지 감성 오로라 배경 */
        .bg-glow-1 {
            position: absolute;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(255, 117, 140, 0.25) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -15%;
            animation: float 14s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            position: absolute;
            width: 650px;
            height: 650px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.2) 0%, rgba(0,0,0,0) 70%);
            bottom: -15%;
            right: -15%;
            animation: float 20s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 60px) scale(1.1); }
        }

        /* 글래스모피즘 성공 카드 (메인 페이지 로그인 창과 찰떡 링크) */
        .welcome-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 60px 50px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 500px;
            z-index: 10;
            animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 힙한 네온 그라데이션이 적용된 성공 체크 아이콘 */
        .success-icon-wrap {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.15) 0%, rgba(255, 117, 140, 0.15) 100%);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }

        .success-icon {
            font-size: 32px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        /* 여행사 감성 타이틀 */
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f2fe;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* 본문 멘트 */
        p {
            font-size: 16px;
            line-height: 1.8;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 300;
        }

        p strong {
            color: #f8fafc;
            font-weight: 600;
        }

        /* 인터랙티브 럭셔리 버튼 */
        .btn-dashboard {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-dashboard:hover {
            background: linear-gradient(135deg, #00f2fe 0%, #ff758c 100%);
            border-color: transparent;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.25);
        }

        .btn-dashboard:active {
            transform: translateY(0);
        }

        /* 로그아웃 버튼 스타일 추가 */
        .btn-logout {
            display: inline-block;
            margin-top: 15px;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 13px;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .btn-logout:hover {
            color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="welcome-card">
        <div class="success-icon-wrap">
            <span class="success-icon">✓</span>
        </div>
        
        <div class="brand-sub">Verified Member</div>
        <h1 id="welcomeTitle">Welcome Aboard!</h1>
        
        <div style="margin-top: 20px;">
            <p><strong>DK Travel</strong> 멤버십 인증이 완료되었습니다.</p>
            <p>일상에서 벗어나 당신이 마주할 특별한 여정,</p>
            <p>엄선된 프리미엄 프라이빗 큐레이션이 지금 시작됩니다. ✈️🍹</p>
        </div>

        <a href="javascript:void(0);" class="btn-dashboard" onclick="alert('당신만을 위한 맞춤형 휴양지 리스트를 확인하세요! 🏝️')">
            Explore Curated Packages
        </a>

        <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>

    <script>
    let auth0Client = null;

    // 1. Auth0 객체 초기화 및 주소창 토큰 유효성 검사 수행
    async function initAuth0() {
        auth0Client = await auth0.createAuth0Client({
            domain: "YOUR_AUTH0_DOMAIN",       // 💡 본인의 Auth0 Domain 값으로 교체하세요
            client_id: "YOUR_AUTH0_CLIENT_ID"   // 💡 본인의 Auth0 Client ID 값으로 교체하세요
        });

        const query = window.location.search;
        
        // Auth0 로그인 페이지로부터 리다이렉트되어 돌아왔을 때 주소창 파라미터(?code=...&state=...) 처리
        if (query.includes("code=") && query.includes("state=")) {
            try {
                // 토큰 교환 작업 완료
                await auth0Client.handleRedirectCallback();
                // 주소창의 복잡한 쿼리 스트링 문자열을 브라우저 히스토리에서 말끔하게 제거
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (err) {
                console.error("인증 핸들러 콜백 처리 중 오류 발생:", err);
            }
        }

        // 2. 사용자가 현재 브라우저 세션에 안전하게 로그인되었는지 최종 체크
        const isAuthenticated = await auth0Client.isAuthenticated();

        if (isAuthenticated) {
            // 로그인 인증 성공 시 Auth0 유저 프로필 데이터 수신
            const user = await auth0Client.getUser();
            console.log("Logged-in User Info:", user);
            
            // h1 웰컴 메세지 타이틀에 동적으로 유저의 닉네임(또는 이름) 반영!
            const welcomeTitle = document.getElementById('welcomeTitle');
            if (welcomeTitle) {
                welcomeTitle.innerText = `Welcome, ${user.nickname || 'Member'}!`;
            }
        } else {
            // 로그인 데이터 없이 다이렉트로 welcome.html 경로를 입력하고 강제 불법 진입한 유저 추방
            alert("정상적인 인증 정보가 없습니다. 메인 로그인 페이지로 이동합니다.");
            window.location.href = 'index.html';
        }
    }

    // 브라우저 화면이 준비되면 Auth0 초기화 로직 실행
    window.onload = async () => {
        await initAuth0();
    };

    // 3. 로그아웃 기능 구현 함수
    async function logout() {
        const currentPath = window.location.pathname;
        const logoutPage = currentPath.endsWith('welcome.html')
            ? currentPath.replace('welcome.html', 'index.html')
            : currentPath.substring(0, currentPath.lastIndexOf('/')) + '/index.html';

        await auth0Client.logout({
            logoutParams: {
                // 로그아웃 절차 종료 후 브라우저가 복귀할 메인 인덱스 페이지 URL 설정
                returnTo: window.location.origin + logoutPage
            }
        });
    }
    </script>
</body>
</html>
